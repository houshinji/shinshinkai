<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>親真会歌プロジェクト</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-sub: #b0b0b0;
            --accent-color: #bb86fc;
            --border-color: #333;
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        /* h1を確実に中央揃えに */
        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 40px;
            display: block;
            width: 100%;
        }

        .playlist-container {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .audio-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }

        .audio-title {
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        audio {
            width: 100%;
            filter: invert(90%) hue-rotate(180deg);
            opacity: 0.8;
        }

        details {
            margin-top: 15px;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        summary {
            cursor: pointer;
            color: var(--accent-color);
            text-align: center;
            list-style: none;
            font-size: 0.9rem;
        }

        /* 歌詞を左寄せに変更 */
        .lyrics-text {
            margin-top: 15px;
            padding: 15px;
            background: #252525;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text-sub);
            white-space: pre-wrap;
            text-align: left; /* 左寄せ */
        }
    </style>
</head>
<body>

    <h1>親真会歌プロジェクト</h1>
    <div id="playlist" class="playlist-container"></div>

    <script>
        // 曲名リストの変更
        const songTitles = [
            "阪田安正「空の向こうへ」", // 変更済み
            "多木敏子「上り坂　下り坂　まさかの坂」",
            "笹川ことえ「思慕」"
        ];

        const container = document.getElementById('playlist');

        async function loadPlaylist() {
            for (const title of songTitles) {
                const card = document.createElement('div');
                card.className = 'audio-card';
                
                let lyrics = "読み込み中...";
                try {
                    // 自動的に 「曲名.txt」 を探しに行きます
                    const response = await fetch(`musics/${title}.txt`);
                    lyrics = response.ok ? await response.text() : "歌詞ファイルが見つかりません。";
                } catch (e) {
                    lyrics = "サーバー環境（Live Server等）で実行してください。";
                }

                card.innerHTML = `
                    <div class="audio-title">${title}</div>
                    <audio src="musics/${title}.mp3" controls></audio>
                    <details class="lyrics-details">
                        <summary class="lyrics-summary">歌詞を表示する</summary>
                        <div class="lyrics-text">${lyrics}</div>
                    </details>
                `;

                const details = card.querySelector('.lyrics-details');
                const summary = card.querySelector('.lyrics-summary');
                
                // ラベル切り替え機能
                details.addEventListener('toggle', () => {
                    summary.textContent = details.open ? "歌詞を隠す" : "歌詞を表示する";
                });

                container.appendChild(card);
            }
        }

        loadPlaylist();
    </script>
</body>
</html>
