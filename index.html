<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>親真会 歌集</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-sub: #b0b0b0;
            /* 紫からゴールドに変更 */
            --accent-color: #d4af37; 
            --border-color: #443c24; /* 枠線も少し金色寄りに */
			--title-border: #333333;
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

		h1 {
			text-align: center;
			color: #d4af37;
			/* 上下左右に影を配置して縁取りを作る */
			text-shadow: 
				2px 2px 0 var(--title-border),
			   -2px 2px 0 var(--title-border),
				2px -2px 0 var(--title-border),
			   -2px -2px 0 var(--title-border),
				0px 2px 4px rgba(0,0,0,0.5); /* 最後に全体の影を入れて浮かせる */
			
			margin-bottom: 40px;
			font-weight: bold;
			letter-spacing: 0.1em;
		}

        .playlist-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* フェードインのための初期状態 */
        .audio-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
            
            /* 初期は透明で下に少しずらしておく */
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        /* スクロールして表示された時の状態 */
        .audio-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .audio-title {
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 1px;
        }

        audio {
            width: 100%;
            /* ゴールドに合わせてフィルターを調整（少し暖色系に） */
            filter: invert(85%) sepia(20%) saturate(1000%) hue-rotate(10deg);
            opacity: 0.9;
        }

        details {
            margin-top: 15px;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        summary {
            cursor: pointer;
            color: var(--accent-color);
            text-align: center;
            list-style: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .lyrics-text {
            margin-top: 15px;
            padding: 15px;
            background: #252525;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text-sub);
            white-space: pre-wrap;
            text-align: left;
        }
    </style>
</head>
<body>

    <h1>親真会 歌集</h1>
    <div id="playlist" class="playlist-container"></div>

    <script>
        const container = document.getElementById('playlist');

        // 交差監視（スクロール検知）の設定
        const observerOptions = {
            root: null,
            rootMargin: "0px",
            threshold: 0.1 // 10%見えたら発火
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        async function createCard(title) {
            const card = document.createElement('div');
            card.className = 'audio-card';
            
            card.innerHTML = `
                <div class="audio-title">${title}</div>
                <audio src="musics/${title}.mp3" controls preload="none"></audio>
                <details class="lyrics-details">
                    <summary class="lyrics-summary">歌詞を表示する</summary>
                    <div class="lyrics-text">読み込み中...</div>
                </details>
            `;

            container.appendChild(card);
            observer.observe(card);

            try {
                const response = await fetch(`musics/${title}.txt`);
                const lyrics = response.ok ? await response.text() : "歌詞ファイルが見つかりません。";
                card.querySelector('.lyrics-text').textContent = lyrics;
            } catch (e) {
                card.querySelector('.lyrics-text').textContent = "サーバー環境で実行してください。";
            }

            const details = card.querySelector('.lyrics-details');
            const summary = card.querySelector('.lyrics-summary');
            details.addEventListener('toggle', () => {
                summary.textContent = details.open ? "歌詞を隠す" : "歌詞を表示する";
            });
        }

        // songlist.txtから曲名リストを取得
        async function loadSongList() {
            try {
                const response = await fetch('musics/index.html');
                if (!response.ok) throw new Error('songlist.txt が見つかりません。');
                
                const text = await response.text();
                // 改行で分割し、空行を除去
                const songTitles = text.split(/\r?\n/).filter(line => line.trim() !== "");
                
                songTitles.forEach(title => createCard(title.trim()));
            } catch (e) {
                container.innerHTML = `<div style="text-align:center; color:red;">${e.message}</div>`;
            }
        }

        // 実行
        loadSongList();
    </script>
</body>
</html>
