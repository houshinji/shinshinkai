<!DOCTYPE html>
<html lang="ja">
<head>
    </head>
<body>

    <h1>親真会 歌集</h1>
    <div id="playlist" class="playlist-container"></div>

    <script>
        const container = document.getElementById('playlist');

        // 交差監視（スクロール検知）の設定
        const observerOptions = {
            root: null,
            rootMargin: "0px",
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        // --- 個別のカード生成関数 ---
        async function createCard(title) {
            const card = document.createElement('div');
            card.className = 'audio-card';
            
            card.innerHTML = `
                <div class="audio-title">${title}</div>
                <audio src="musics/${title}.mp3" controls preload="none"></audio>
                <details class="lyrics-details">
                    <summary class="lyrics-summary">歌詞を表示する</summary>
                    <div class="lyrics-text">読み込み中...</div>
                </details>
            `;

            container.appendChild(card);
            observer.observe(card);

            try {
                const response = await fetch(`musics/${title}.txt`);
                const lyrics = response.ok ? await response.text() : "歌詞ファイルが見つかりません。";
                card.querySelector('.lyrics-text').textContent = lyrics;
            } catch (e) {
                card.querySelector('.lyrics-text').textContent = "サーバー環境で実行してください。";
            }

            const details = card.querySelector('.lyrics-details');
            const summary = card.querySelector('.lyrics-summary');
            details.addEventListener('toggle', () => {
                summary.textContent = details.open ? "歌詞を隠す" : "歌詞を表示する";
            });
        }

        // --- 追加：テキストファイルから曲名を読み込む関数 ---
        async function init() {
            try {
                // songlist.txt を読み込み
                const response = await fetch('songlist.txt');
                if (!response.ok) throw new Error('曲リストが見つかりません');
                
                const text = await response.text();
                
                // 改行で分割し、空行を除去して配列化
                const songTitles = text.split(/\r?\n/).filter(line => line.trim() !== "");

                // 配列を元にカードを生成
                songTitles.forEach(title => createCard(title));

            } catch (error) {
                console.error('エラー:', error);
                container.innerHTML = `<p style="text-align:center;">曲リストの読み込みに失敗しました。</p>`;
            }
        }

        // 実行
        init();
    </script>
</body>
</html>
