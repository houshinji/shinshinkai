<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>親真会 - オーディオライブラリ</title>
    <style>
        /* ダークテーマの配色設定 */
        :root {
            --bg-color: #121212;       /* 全体の背景 */
            --card-bg: #1e1e1e;       /* カードの背景 */
            --text-main: #e0e0e0;     /* メイン文字色 */
            --text-sub: #b0b0b0;      /* 補足文字色 */
            --accent-color: #bb86fc;  /* アクセント（紫系） */
            --border-color: #333;      /* 区切り線 */
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 40px;
        }

        .playlist-container {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .audio-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }

        .audio-title {
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            color: var(--text-main);
        }

        /* オーディオプレイヤーも少し暗めに（ブラウザ依存あり） */
        audio {
            width: 100%;
            filter: invert(90%) hue-rotate(180deg); /* プレイヤーをダーク化する技 */
            opacity: 0.8;
        }

        details {
            margin-top: 15px;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        summary {
            cursor: pointer;
            color: var(--accent-color);
            text-align: center;
            list-style: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        summary:hover {
            opacity: 0.7;
        }

        .lyrics-text {
            margin-top: 15px;
            padding: 15px;
            background: #252525;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text-sub);
            white-space: pre-wrap;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>親真会</h1>
    <div id="playlist" class="playlist-container"></div>

    <script>
        const songTitles = [
            "阪田安正「空の向こうへ」",
            "多木敏子「上り坂　下り坂　まさかの坂」",
            "笹川ことえ「思慕」"
        ];

        const container = document.getElementById('playlist');

        async function loadPlaylist() {
            for (const title of songTitles) {
                const card = document.createElement('div');
                card.className = 'audio-card';
                
                let lyrics = "読み込み中...";
                try {
                    const response = await fetch(`musics/${title}.txt`);
                    lyrics = response.ok ? await response.text() : "歌詞が見つかりません。";
                } catch (e) {
                    lyrics = "サーバー環境で実行してください。";
                }

                card.innerHTML = `
                    <div class="audio-title">${title}</div>
                    <audio src="musics/${title}.mp3" controls></audio>
                    <details class="lyrics-details">
                        <summary class="lyrics-summary">歌詞を表示する</summary>
                        <div class="lyrics-text">${lyrics}</div>
                    </details>
                `;

                // ラベル切り替えのイベント設定
                const details = card.querySelector('.lyrics-details');
                const summary = card.querySelector('.lyrics-summary');
                
                details.addEventListener('toggle', () => {
                    if (details.open) {
                        summary.textContent = "歌詞を隠す";
                    } else {
                        summary.textContent = "歌詞を表示する";
                    }
                });

                container.appendChild(card);
            }
        }

        loadPlaylist();
    </script>
</body>
</html>
