<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>親真会 - オーディオライブラリ</title>
    <style>
        /* 全体の基本スタイル */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 40px;
            font-size: 2rem;
        }

        /* プレイリストを囲むコンテナ */
        .playlist-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 各曲のカードスタイル */
        .audio-card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
        }

        .audio-card:hover {
            transform: translateY(-5px);
        }

        .audio-title {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: #444;
            text-align: center;
        }

        /* オーディオプレイヤーの幅を調整 */
        audio {
            width: 100%;
            max-width: 400px;
        }

        /* レスポンシブ対応：画面が広い場合は2列にする */
        @media (min-width: 600px) {
            .playlist-container {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            }
        }
    </style>
</head>
<body>

    <h1>親真会</h1>

    <div class="playlist-container">
        <div class="audio-card">
            <div class="audio-title">阪田安正「春の風が吹いた日に」</div>
            <audio src="musics/阪田安正「春の風が吹いた日に」.mp3" controls>
                お使いのブラウザは audio 要素をサポートしていません。
            </audio>
        </div>

        <div class="audio-card">
            <div class="audio-title">多木敏子「上り坂 下り坂 まさかの坂」</div>
            <audio src="musics/多木敏子「上り坂　下り坂　まさかの坂」.mp3" controls>
                お使いのブラウザは audio 要素をサポートしていません。
            </audio>
        </div>

        <div class="audio-card">
            <div class="audio-title">笹川ことえ「思慕」</div>
            <audio src="musics/笹川ことえ「思慕」.mp3" controls>
                お使いのブラウザは audio 要素をサポートしていません。
            </audio>
        </div>
    </div>

</body>
</html>
