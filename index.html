<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>親真会歌プロジェクト</title>
    <style>
        /* スタイルは前回のものを継承 */
        body { font-family: sans-serif; background: #f5f7fa; padding: 20px; }
        .playlist-container { max-width: 800px; margin: 0 auto; display: grid; gap: 20px; }
        .audio-card { background: #fff; padding: 20px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .audio-title { font-weight: bold; margin-bottom: 10px; text-align: center; }
        audio { width: 100%; }
        .lyrics-text { margin-top: 10px; padding: 15px; background: #fafafa; white-space: pre-wrap; font-size: 0.9rem; border-radius: 5px; }
        summary { cursor: pointer; color: #007bff; text-align: center; list-style: none; margin-top: 10px;}
    </style>
</head>
<body>

    <h1>親真会歌プロジェクト</h1>
    <div id="playlist" class="playlist-container"></div>

    <script>
        // ★ 曲名（ファイル名）をここに追加するだけ！
        const songTitles = [
            "阪田安正「空の向こうへ」",
            "多木敏子「上り坂　下り坂　まさかの坂」",
            "笹川ことえ「思慕」"
        ];

        const container = document.getElementById('playlist');

        async function loadPlaylist() {
            for (const title of songTitles) {
                const card = document.createElement('div');
                card.className = 'audio-card';
                
                // 歌詞ファイルを読み込む（非同期処理）
                let lyrics = "歌詞を読み込み中...";
                try {
                    const response = await fetch(`musics/${title}.txt`);
                    if (response.ok) {
                        lyrics = await response.text();
                    } else {
                        lyrics = "歌詞ファイルが見つかりません。";
                    }
                } catch (e) {
                    lyrics = "読み込みエラー（サーバー経由で開いてください）";
                }

                card.innerHTML = `
                    <div class="audio-title">${title}</div>
                    <audio src="musics/${title}.mp3" controls></audio>
                    <details>
                        <summary>歌詞を表示する</summary>
                        <div class="lyrics-text">${lyrics}</div>
                    </details>
                `;
                container.appendChild(card);
            }
        }

        loadPlaylist();
    </script>
</body>
</html>
