<!DOCTYPE html>
<html lang="ja">
<head>
	<!--2026/3/26 11:12-->
	<link rel="icon" href="favicon.svg" type="image/svg+xml">
	<link rel="manifest" href="manifest.json">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>親真会 歌集</title>
	<style>
		/* 元の CSS をそのまま継承 */
		:root {
			--bg-color: #121212;
			--card-bg: #1e1e1e;
			--text-main: #e0e0e0;
			--text-sub: #b0b0b0;
			--accent-color: #d4af37;
			--border-color: #443c24;
			--title-border: #333333;
		}

		body {
			font-family: "Helvetica Neue", Arial, sans-serif;
			background-color: var(--bg-color);
			color: var(--text-main);
			margin: 0;
			padding: 20px;
		}

		h1 {
			text-align: center;
			color: #d4af37;
			text-shadow: 2px 2px 0 var(--title-border), -2px 2px 0 var(--title-border), 2px -2px 0 var(--title-border), -2px -2px 0 var(--title-border), 0px 2px 4px rgba(0,0,0,0.5);
			margin-bottom: 40px;
			font-weight: bold;
			letter-spacing: 0.1em;
		}

		.playlist-container {
			max-width: 800px;
			margin: 0 auto;
			display: flex;
			flex-direction: column;
			gap: 30px;
		}

		.audio-card {
			background: var(--card-bg);
			padding: 20px;
			border-radius: 16px;
			box-shadow: 0 10px 25px rgba(0,0,0,0.6);
			border: 1px solid var(--border-color);
			opacity: 0;
			transform: translateY(30px);
			transition: opacity 0.8s ease-out, transform 0.8s ease-out;
		}

		.audio-card.visible { opacity: 1; transform: translateY(0); }

		.audio-title { font-weight: bold; margin-bottom: 15px; text-align: center; letter-spacing: 1px; }

		audio {
			width: 100%;
			filter: invert(85%) sepia(20%) saturate(1000%) hue-rotate(10deg);
			opacity: 0.9;
		}

		details { margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 15px; }
		summary { cursor: pointer; color: var(--accent-color); text-align: center; list-style: none; font-size: 0.9rem; font-weight: 500; }

		.lyrics-text {
			margin-top: 15px; padding: 15px; background: #252525; border-radius: 8px; font-size: 0.95rem; line-height: 1.8; color: var(--text-sub); white-space: pre-wrap; text-align: left;
		}

		#install-button-container {
			position: static; display: none; flex-direction: column; align-items: center; justify-content: center; margin-top: 40px; margin-bottom: 40px; animation: slideUp 0.3s ease-out;
		}

		@keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

		#install-btn {
			background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
			color: #000; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); transition: all 0.3s ease; max-width: 300px;
		}

		.install-description { margin-top: 10px; font-size: 0.85rem; color: var(--text-sub); text-align: center; line-height: 1.6; max-width: 300px; }
		.status-message { max-width: 800px; margin: 0 auto 20px auto; text-align: center; color: var(--text-sub); font-size: 0.9rem; min-height: 1.4em; }
	</style>
</head>
<body>
	<h1>親真会 歌集</h1>
	<div id="status-message" class="status-message"></div>
	<div id="playlist" class="playlist-container"></div>

	<div id="install-button-container">
		<button id="install-btn">アプリ(PWA)としてインストール</button>
	<!--	<div class="install-description">
			インストールすると一度再生した曲が保存され、次回から通信費を使わず再生できるようになります
	</div>-->
	</div>

	<script>
		let deferredPrompt = null;
		let swRegistration = null;

		const container = document.getElementById('playlist');
		const installContainer = document.getElementById('install-button-container');
		const installBtn = document.getElementById('install-btn');
		const statusMessage = document.getElementById('status-message');

		function isiOS() { return /iPad|iPhone|iPod/.test(navigator.userAgent); }
		function setStatus(message) { statusMessage.textContent = message || ''; }

		const observer = new IntersectionObserver((entries) => {
			entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
		}, { threshold: 0.1 });

		function parseSongList(text) { return text.split(/\r?\n/).map(line => line.trim()).filter(Boolean); }

		async function loadLyrics(title, lyricsTextElement) {
			const lyricsPath = `musics/${encodeURIComponent(title)}.txt`;
			try {
				const response = await fetch(lyricsPath);
				lyricsTextElement.textContent = response.ok ? await response.text() : '歌詞ファイルが見つかりません。';
			} catch { lyricsTextElement.textContent = '歌詞を読み込めませんでした。'; }
		}

		function createCard(title) {
			const card = document.createElement('div');
			card.className = 'audio-card';
			card.innerHTML = `
				<div class="audio-title">${title}</div>
				<audio controls preload="none" src="musics/${encodeURIComponent(title)}.mp3"></audio>
				<details class="lyrics-details">
					<summary class="lyrics-summary">歌詞を表示する</summary>
					<div class="lyrics-text" data-loaded="false"></div>
				</details>
			`;
			const details = card.querySelector('.lyrics-details');
			const summary = card.querySelector('.lyrics-summary');
			const lyricsText = card.querySelector('.lyrics-text');

			details.addEventListener('toggle', async () => {
				summary.textContent = details.open ? '歌詞を隠す' : '歌詞を表示する';
				if (details.open && lyricsText.dataset.loaded !== 'true') {
					lyricsText.textContent = '読み込み中...';
					await loadLyrics(title, lyricsText);
					lyricsText.dataset.loaded = 'true';
				}
			});
			container.appendChild(card);
			observer.observe(card);
		}

		async function loadSongList() {
			container.innerHTML = '';
			try {
				const response = await fetch('musics/index.html');
				if (!response.ok) throw new Error('曲リストが見つかりません。');
				const titles = parseSongList(await response.text());
				titles.length ? titles.forEach(createCard) : container.innerHTML = '<div>曲がありません。</div>';
			} catch (e) { container.innerHTML = `<div style="color:red;">${e.message}</div>`; }
		}

		async function registerServiceWorkerAndInit() {
			if ('serviceWorker' in navigator) {
				try {
					swRegistration = await navigator.serviceWorker.register('sw.js');
					await navigator.serviceWorker.ready;
					if (navigator.onLine) {
						setStatus('更新を確認しています...');
						const controller = navigator.serviceWorker.controller || swRegistration.active;
						if (controller) controller.postMessage({ type: 'SYNC_MUSICS' });
						setStatus('');
					}
				} catch (e) { console.error(e); }
			}
			await loadSongList();
		}

		window.addEventListener('beforeinstallprompt', (e) => {
			e.preventDefault();
			deferredPrompt = e;
			if (!isiOS()) installContainer.style.display = 'flex';
		});

		installBtn.addEventListener('click', async () => {
			if (!deferredPrompt) return;
			deferredPrompt.prompt();
			const { outcome } = await deferredPrompt.userChoice;
			if (outcome === 'accepted') { deferredPrompt = null; installContainer.style.display = 'none'; }
		});

		window.addEventListener('load', registerServiceWorkerAndInit);
		window.addEventListener('online', () => { setStatus(''); loadSongList(); });
		window.addEventListener('offline', () => setStatus('オフラインで動作中です。'));
	</script>
</body>
</html>
